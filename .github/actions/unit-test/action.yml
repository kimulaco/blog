inputs:
  codecov-token:
    required: true

runs:
  using: 'Composite'
  steps:
    - run: pnpm run test:unit:coverage
      shell: bash
    - uses: codecov/codecov-action@5a1091511ad55cbe89839c7260b706298ca349f7 # v5.5.1
      with:
        files: .coverage/coverage-final.json
        token: ${{ inputs.codecov-token }}
